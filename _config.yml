title: Odisse, Estúdio de Arquitetura e Design
description: >
  Odisse, Estúdio de Arquitetura e Design. Projetos de arquitetura,
  objetos autorais e pesquisa editorial.

# Site em domínio próprio (odisse.com.br) — sem subdiretório
baseurl: ""
url: "https://www.odisse.com.br"

collections:
  projetos:
    output: true
    permalink: /projetos/:name/
    sort_by: ordem

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: ""
      type: "projetos"
    values:
      layout: "projeto"
  - scope:
      path: "sobre.html"
    values:
      permalink: /sobre/
  - scope:
      path: "contato.html"
    values:
      permalink: /contato/

exclude:
  - README.md
