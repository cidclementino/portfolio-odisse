<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
<meta name="description" content="{{ page.description | default: site.description }}">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/styles.css' | relative_url }}">
<script src="{{ '/analytics.js' | relative_url }}" defer></script>
</head>
<body{% if page.url contains 'sobre' or page.url contains 'contato' %} class="is-dark-page"{% endif %}>

{% include nav.html %}
{% include corner-marks.html %}

{{ content }}

{% if page.url == '/index.html' or page.url == '/' %}
<button class="back-to-top" aria-label="Voltar ao topo" type="button">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
</button>
{% endif %}

{% include footer.html %}

<script src="{{ '/script.js' | relative_url }}" defer></script>
<script src="{{ '/transitions.js' | relative_url }}" defer></script>
{% if page.url == '/index.html' or page.url == '/' %}
<script src="{{ '/gallery.js' | relative_url }}" defer></script>
{% endif %}
</body>
</html>
